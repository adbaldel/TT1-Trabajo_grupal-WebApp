<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Send Report</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <div class="container">
        <h2>Send Communication</h2>
        
        <form th:action="@{/email}" method="post">
            <div class="form-group">
                <label for="email">Recipient Email</label>
                <input type="email" id="email" name="email" required placeholder="colleague@domain.com">
            </div>
            <div class="form-group">
                <label for="mensaje">Message Body</label>
                <textarea id="mensaje" name="mensaje" rows="5" required placeholder="Type your report here..."></textarea>
            </div>
            <button type="submit">Send Email</button>
        </form>
    </div>
</body>
</html>
