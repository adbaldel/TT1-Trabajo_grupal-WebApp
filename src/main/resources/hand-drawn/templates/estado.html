<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Consultar Estado</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <div class="card">
        <h1>Consultar Token</h1>
        <form action="#" th:action="@{/estado}" method="post">
            <div class="form-group">
                <label for="token">Ingresa tu Token Numérico:</label>
                <input type="number" id="token" name="token" required>
            </div>
            <button type="submit" class="btn">Consultar</button>
            <a th:href="@{/home}" class="btn" style="background-color: transparent;">Volver</a>
        </form>
    </div>
</div>
</body>
</html>
