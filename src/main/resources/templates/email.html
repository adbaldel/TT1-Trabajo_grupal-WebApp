<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Enviar Correo</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <div class="card">
        <h1>Escribir una Carta</h1>
        <form action="#" th:action="@{/email}" method="post">
            <div class="form-group">
                <label for="email">Destinatario (Email):</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="mensaje">Tu Mensaje:</label>
                <textarea id="mensaje" name="mensaje" rows="5" required></textarea>
            </div>
            <button type="submit" class="btn">Enviar Paloma Mensajera</button>
            <a th:href="@{/home}" class="btn" style="background-color: transparent;">Cancelar</a>
        </form>
    </div>
</div>
</body>
</html>
