<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Login')}"></head>
<body class="pt-28 pb-10 px-4 flex justify-center items-center min-h-screen font-sans">

<div class="bg-neoyellow neo-border neo-shadow max-w-sm w-full p-8 relative mt-10">
    <div class="absolute -top-6 -left-6 bg-black text-white font-bold text-2xl uppercase px-4 py-2 shadow-[4px_4px_0px_0px_rgba(255,73,219,1)] border-[3px] border-black">
        Acceso
    </div>

    <form th:action="@{/login}" method="post" class="space-y-6 mt-8 bg-white p-6 neo-border neo-shadow-sm">
        <div class="flex flex-col gap-2">
            <label for="nombreUsuario" class="font-bold text-lg uppercase">Nombre de Usuario:</label>
            <input type="text" id="nombreUsuario" name="nombreUsuario" required class="neo-input p-3 text-xl font-bold" placeholder="Escribe tu nombre..." />
        </div>

        <button type="submit" class="neo-btn bg-neoblue text-black w-full py-4 text-xl hover:bg-neogreen">
            Iniciar sesión
        </button>
    </form>
</div>

</body>
</html>
