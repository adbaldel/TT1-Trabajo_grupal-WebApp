<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>System Notification</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>

<h1>SYSTEM MESSAGE</h1>

<div class="neo-box" th:style="${problemDetails != null ? 'background-color: var(--accent-pink);' : 'background-color: var(--accent-yellow);'}">
    <h2 th:text="${resultado}" style="margin:0;">Operation Result</h2>

    <div th:if="${problemDetails != null}" style="margin-top: 15px; padding-top: 15px; border-top: 4px solid var(--border-color);">
        <strong>Error Details:</strong>
        <p th:text="${problemDetails}"></p>
    </div>
</div>

<a th:href="@{/home}" class="neo-button">← Return Home</a>

</body>
</html>
