<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Simulation Player</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <style>
        .grid-container {
            display: grid;
            gap: 2px;
            background-color: var(--border-color); /* acts as grid lines */
            border: var(--border-width) solid var(--border-color);
            box-shadow: 8px 8px 0px var(--border-color);
            margin: 20px 0;
        }
        .grid-cell {
            background-color: white; /* Default empty color */
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
        }

        .legend-container {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            padding: 10px;
            border: 2px solid var(--border-color);
            background-color: white;
            box-shadow: 4px 4px 0px var(--border-color);
            width: 100%;
            max-width: 800px;
            box-sizing: border-box;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 800;
            text-transform: capitalize;
        }
        .legend-color-box {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border-color);
        }

        /* Styling for the timeline slider */
        .neo-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 15px;
            background: #e0e0e0;
            border: 2px solid var(--border-color);
            outline: none;
        }
        .neo-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 25px;
            height: 25px;
            background: var(--accent-blue);
            border: 2px solid var(--border-color);
            cursor: pointer;
        }
        .neo-slider::-moz-range-thumb {
            width: 25px;
            height: 25px;
            background: var(--accent-blue);
            border: 2px solid var(--border-color);
            cursor: pointer;
        }
    </style>
</head>
<body>

<h1>Simulation View</h1>

<div th:if="${problemDetails != null}" class="error-banner">
    <p th:text="${problemDetails}">Error</p>
</div>

<div th:if="${problemDetails == null}" style="display: flex; flex-direction: column; align-items: center; width: 100%;">

    <div id="dynamic-legend" class="legend-container" style="display: none;">
    </div>

    <div class="neo-box" style="width: 100%; max-width: 800px; padding: 20px; box-sizing: border-box;">

        <h2 style="margin-top: 0;">Time: <span id="time-display">0</span> / <span th:text="${maxTime}"></span></h2>

        <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 20px;">
            <strong>Timeline:</strong>
            <input type="range" id="time-slider" min="0" th:max="${maxTime}" value="0" class="neo-slider">
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
            <div style="display: flex; gap: 10px;">
                <button class="neo-button" onclick="prevFrame()">◀ Prev</button>
                <button class="neo-button" onclick="togglePlay()" id="play-btn">Play</button>
                <button class="neo-button" onclick="nextFrame()">Next ▶</button>
            </div>

            <div style="display: flex; align-items: center; gap: 10px;">
                <strong>Speed:</strong>
                <select id="speed-select" class="neo-input" style="width: auto; margin-bottom: 0; padding: 10px;" onchange="updateSpeed()">
                    <option value="2000">0.25x</option>
                    <option value="1000">0.5x</option>
                    <option value="500" selected>1x</option>
                    <option value="250">2x</option>
                    <option value="125">4x</option>
                    <option value="50">Max</option>
                </select>
            </div>
        </div>

    </div>

    <div id="sim-grid" class="grid-container"></div>
</div>

<br>
<a th:href="@{/home}" class="neo-button" style="background-color: white;">← Back to Home</a>

<script th:inline="javascript">
    /*<![CDATA[*/
    const gridSize = /*[[${gridSize}]]*/ 10;
    const maxTime = /*[[${maxTime}]]*/ 0;
    const creaturesMap = /*[[${creatures}]]*/ {};
    /*]]>*/

    const neoPalette = [
        '#ffde59', '#5ce1e6', '#ff66c4', '#7ed957', '#ff914d', '#c084fc', '#ff5757'
    ];

    const creatureColorMap = {};
    let colorIndex = 0;

    function getCreatureColor(name) {
        if (!creatureColorMap[name]) {
            creatureColorMap[name] = neoPalette[colorIndex % neoPalette.length];
            colorIndex++;
        }
        return creatureColorMap[name];
    }

    let currentTime = 0;
    let playInterval = null;
    let playSpeed = 500; // Default 500ms

    const gridElement = document.getElementById('sim-grid');
    const timeSlider = document.getElementById('time-slider');

    // Listen for user interacting with the slider
    if (timeSlider) {
        timeSlider.addEventListener('input', function() {
            currentTime = parseInt(this.value);
            renderFrame(currentTime);
        });
    }

    if (gridElement) {
        setupGrid();
        buildLegend();
        renderFrame(currentTime);
    }

    function setupGrid() {
        gridElement.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;
        gridElement.style.gridTemplateRows = `repeat(${gridSize}, 1fr)`;

        for (let y = 0; y < gridSize; y++) {
            for (let x = 0; x < gridSize; x++) {
                let cell = document.createElement('div');
                cell.className = 'grid-cell';
                cell.id = `cell-${x}-${y}`;
                gridElement.appendChild(cell);
            }
        }
    }

    function buildLegend() {
        const legendContainer = document.getElementById('dynamic-legend');
        if (Object.keys(creaturesMap).length === 0) return;

        const uniqueCreatures = [...new Set(Object.values(creaturesMap))].map(c => c.toLowerCase());

        if (uniqueCreatures.length > 0) {
            legendContainer.style.display = 'flex';
            uniqueCreatures.forEach(name => {
                const color = getCreatureColor(name);
                const itemDiv = document.createElement('div');
                itemDiv.className = 'legend-item';

                const colorBox = document.createElement('div');
                colorBox.className = 'legend-color-box';
                colorBox.style.backgroundColor = color;

                const textNode = document.createTextNode(name);
                itemDiv.appendChild(colorBox);
                itemDiv.appendChild(textNode);
                legendContainer.appendChild(itemDiv);
            });
        }
    }

    function renderFrame(time) {
        document.getElementById('time-display').innerText = time;
        if (timeSlider) timeSlider.value = time; // Sync slider with current time

        document.querySelectorAll('.grid-cell').forEach(cell => {
            cell.style.backgroundColor = 'white';
            cell.innerHTML = '';
            cell.title = '';
        });

        for (let y = 0; y < gridSize; y++) {
            for (let x = 0; x < gridSize; x++) {
                const key = `${time}-${x}-${y}`;
                if (creaturesMap[key]) {
                    const cell = document.getElementById(`cell-${x}-${y}`);
                    const creatureName = creaturesMap[key].toLowerCase();

                    cell.style.backgroundColor = getCreatureColor(creatureName);
                    // cell.innerText = creatureName.charAt(0).toUpperCase();
                    cell.title = creatureName;
                }
            }
        }
    }

    function nextFrame() {
        if (currentTime < maxTime) {
            currentTime++;
            renderFrame(currentTime);
        } else {
            togglePlay(); // Auto-stop at end
        }
    }

    function prevFrame() {
        if (currentTime > 0) {
            currentTime--;
            renderFrame(currentTime);
        }
    }

    function togglePlay() {
        const btn = document.getElementById('play-btn');
        if (playInterval) {
            clearInterval(playInterval);
            playInterval = null;
            btn.innerText = "Play";
            btn.style.backgroundColor = "var(--accent-yellow)";
        } else {
            if (currentTime >= maxTime) currentTime = 0;
            playInterval = setInterval(nextFrame, playSpeed);
            btn.innerText = "Pause";
            btn.style.backgroundColor = "var(--accent-pink)";
        }
    }

    function updateSpeed() {
        const select = document.getElementById('speed-select');
        playSpeed = parseInt(select.value);

        // If the simulation is currently playing, restart the interval immediately to apply new speed
        if (playInterval) {
            clearInterval(playInterval);
            playInterval = setInterval(nextFrame, playSpeed);
        }
    }
</script>
</body>
</html>
