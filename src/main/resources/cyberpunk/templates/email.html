<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SYS.COMMS // CYBER_SIM</title>
    <link rel="stylesheet" th:href="@{/css/cyberpunk.css}">
</head>
<body>
    <div class="container">
        <h1>[ COMMS_UPLINK ]</h1>
        <form th:action="@{/email}" method="post">
            <div class="form-group">
                <label for="email">Target Address</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="mensaje">Payload Message</label>
                <textarea id="mensaje" name="mensaje" rows="4" required></textarea>
            </div>
            <button type="submit" class="btn">TRANSMIT_DATA</button>
            <a th:href="@{/home}" class="btn">BACK</a>
        </form>
    </div>
</body>
</html>
